{{- if .Values.keyGeneration.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "claimctl.fullname" . }}-secret-manager
  labels:
    {{- include "claimctl.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "claimctl.fullname" . }}-secret-manager
  labels:
    {{- include "claimctl.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "claimctl.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "claimctl.fullname" . }}-secret-manager
  apiGroup: rbac.authorization.k8s.io
{{- end }}
